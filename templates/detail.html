<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ berita.judul }} - {{ sekolah }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height: 60px;">
            <div>
                <h1>{{ sekolah }}</h1>
                <p>{{ slogan }}</p>
            </div>
        </div>
    </header>

    <nav class="main-nav">
        <ul style="display: flex; list-style: none; margin: 0; background-color: #0056b3; padding: 0 5%;">
            <li><a href="/" style="display: block; padding: 15px 20px; color: white; text-decoration: none;">Beranda</a></li>            
            <li><a href="/berita" style="display: block; padding: 15px 20px; color: white; text-decoration: none;">Berita</a></li>
            <li><a href="/visi_misi" style="display: block; padding: 15px 20px; color: white; text-decoration: none;">Visi Misi</a></li>
            <li><a href="#" style="display: block; padding: 15px 20px; color: white; text-decoration: none;">Kontak</a></li>
        </ul>
    </nav>

    <div class="content-container" style="margin-top: 20px; justify-content: center;">
        <main class="main-content" style="max-width: 800px; float: none; margin: 0 auto;">
            <article class="card">
    <h2>Berita Terbaru</h2>
    <hr>
    
    {% for item in berita %}
        <div class="news-item" style="margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px dashed #ccc; display: flex; gap: 20px; align-items: flex-start;">
            
            {% if item.gambar %}
                <div class="news-image">
                    <img src="{{ url_for('static', filename=item.gambar) }}" alt="{{ item.judul }}" style="width: 180px; height: 120px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                </div>
            {% endif %}
            
            <div class="news-text" style="flex: 1;">
                
                <h3 style="margin-bottom: 5px;">
                    <a href="/berita/{{ item.id }}" style="text-decoration: none; color: #0056b3; font-size: 1.2rem; font-weight: bold;">
                        {{ item.judul }}
                    </a>
                </h3>
                
                <p class="date" style="color: #888; font-size: 0.8rem; margin-bottom: 10px;">📅 Diposting pada: {{ item.tanggal }}</p>
                <p style="font-size: 1.1rem; line-height: 1.8; color: #333; text-align: justify; white-space: pre-line;">
    {{ berita.isi }}
</p>
                
               
                
            </div>
            
        </div>
    {% endfor %}
</article>
        </main>
    </div>

    <footer class="main-footer">
        <p>&copy; {{ tahun }} {{ sekolah }}. Semua Hak Dilindungi.</p>
    </footer>

</body>
</html>
