<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ berita.judul }} - {{ sekolah }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="main-header">
        <div class="logo-area">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height: 60px;">
            <div>
                <h1>{{ sekolah }}</h1>
                <p>{{ slogan }}</p>
            </div>
        </div>
    </header>

    <nav class="main-nav">
        <ul>
            <li><a href="/">Beranda</a></li>
            <li><a href="/berita">Berita</a></li>
            <li><a href="/visi_misi">Visi Misi</a></li>
            <li><a href="/sippn">SIPPN</a></li>
        </ul>
    </nav>

    <div class="content-container" style="margin-top: 20px; justify-content: center;">
        <main class="main-content" style="max-width: 800px; float: none; margin: 0 auto;">
            <article class="card" style="padding: 30px;">
                <h2 style="color: #0056b3;">{{ berita.judul }}</h2>
                <p style="color: #888; font-size: 0.9rem;">📅 Diposting pada: {{ berita.tanggal }}</p>
                <hr style="margin: 20px 0;">
                
                {% if berita.gambar %}
                    <img src="{{ url_for('static', filename=berita.gambar) }}" alt="{{ berita.judul }}" style="width: 100%; border-radius: 8px; margin-bottom: 20px;">
                {% endif %}
                
                <p style="font-size: 1.1rem; line-height: 1.8; color: #333; text-align: justify; white-space: pre-line;">
                    {{ berita.isi }}
                </p>
            </article>
        </main>
    </div>

    <footer class="main-footer" style="text-align: center; padding: 20px; margin-top: 40px; background: #eee;">
        <p>&copy; 2026 {{ sekolah }}. Semua Hak Dilindungi.</p>
    </footer>

</body>
</html>
