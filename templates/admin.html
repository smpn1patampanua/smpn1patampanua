<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tambah Berita</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h2 { color: #0056b3; margin-top: 0; }
        label { font-weight: bold; color: #333; }
        input, textarea { width: 100%; padding: 10px; margin: 8px 0 20px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #0056b3; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; }
        button:hover { background-color: #004494; }
        .link-logout { display: block; text-align: center; margin-top: 20px; color: #dc3545; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Tambah Berita Baru</h2>
        <form method="POST" action="/admin">
            <label>Judul:</label>
            <input type="text" name="judul" required>
            
            <label>Tanggal:</label>
            <input type="text" name="tanggal" placeholder="Contoh: 16 Juli 2026" required>
            
            <label>Isi Berita:</label>
            <textarea name="isi" rows="6" required></textarea>
            
            <label>Nama File Gambar (contoh: sekolah.jpg):</label>
            <input type="text" name="gambar" placeholder="Pastikan file ada di folder static">
            
            <button type="submit">Posting Berita</button>
        </form>
        <a href="/logout" class="link-logout">Keluar (Logout)</a>
    </div>

</body>
</html>
