<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tambah Pengumuman</title>
    <style>
        body { font-family: sans-serif; padding: 50px; background: #f4f6f9; }
        .form-card { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Tambah Pengumuman Baru</h2>
        <form method="POST">
            <input type="text" name="kategori" placeholder="Kategori (Contoh: Info / Penting)" required>
            <textarea name="isi" rows="4" placeholder="Isi pengumuman..." required></textarea>
            <button type="submit">Simpan Pengumuman</button>
            <a href="/" style="margin-left: 10px; text-decoration: none; color: #666;">Batal</a>
        </form>
    </div>
</body>
</html>
