<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - UPT SMPN 1 Patampanua</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: #f4f6f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            text-align: center; 
        }
        h2 { color: #0056b3; margin-bottom: 25px; }
        label { display: block; text-align: left; margin-bottom: 5px; font-weight: 600; color: #555; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            box-sizing: border-box; /* Penting agar padding tidak merusak lebar */
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background-color: #0056b3; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: background 0.3s;
        }
        button:hover { background-color: #004494; }
        .back-link { display: block; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login Admin</h2>
        <form method="POST" action="/login">
            <label>Username</label>
            <input type="text" name="username" required>
            
            <label>Password</label>
            <input type="password" name="password" required>
            
            <button type="submit">Masuk</button>
        </form>
        <a href="/" class="back-link">← Kembali ke Beranda</a>
    </div>

</body>
</html>
